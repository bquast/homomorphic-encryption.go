name: Deploy WASM Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - run: |
          cd bfv
          GOOS=js GOARCH=wasm go build -o bfv.wasm bfv.go
          wget https://raw.githubusercontent.com/golang/go/release-branch.go1.22/misc/wasm/wasm_exec.js
          cd ..
          
      - run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          pandoc README.md -o index.html --standalone --css=bfv/style.css --metadata title="Homomorphic Encryption"
          
      - uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - id: deployment
        uses: actions/deploy-pages@v4