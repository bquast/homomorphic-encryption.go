name: Deploy WASM Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Build WASM binaries
        run: |
          # Build each scheme directly from its file without needing go.mod
          GOOS=js GOARCH=wasm go build -o bfv.wasm bfv.go
          GOOS=js GOARCH=wasm go build -o bgv.wasm bgv.go
          
          # Grab the required JS glue code
          wget https://raw.githubusercontent.com/golang/go/release-branch.go1.22/misc/wasm/wasm_exec.js
          
      - name: Render README to HTML
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          # Convert README.md to index.html and inject the shared style.css
          pandoc README.md -o index.html --standalone --css=style.css --metadata title="Homomorphic Encryption"
          
      - uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - id: deployment
        uses: actions/deploy-pages@v4